<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>八字戀愛交流聚</title>
  <meta name="description" content="八字戀愛交流聚，瞭解自己，吸引對的愛。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Noto+Serif+TC:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500&family=Parisienne&display=swap" rel="stylesheet" />
  <style>
    :root {
      --wine: #744038;
      --wine-soft: #916557;
      --text: #3d2f29;
      --text-soft: #736255;
      --paper: rgba(255, 249, 242, 0.965);
      --paper-2: rgba(255, 247, 238, 0.94);
      --line: rgba(136, 97, 73, 0.14);
      --card-shadow:
        0 28px 60px rgba(66, 40, 25, 0.16),
        0 12px 24px rgba(98, 66, 40, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.72);
      --card-shadow-soft:
        0 18px 34px rgba(87, 55, 34, 0.12),
        0 8px 16px rgba(120, 83, 58, 0.06);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      overflow-x: hidden;
      font-family: "Noto Sans TC", sans-serif;
      color: var(--text);
      background:
        linear-gradient(rgba(83, 58, 36, 0.18), rgba(83, 58, 36, 0.18)),
        url("floral-bg.png") center center / cover no-repeat,
        #f5ede2;
      animation: backgroundDrift 28s ease-in-out infinite alternate;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      border-radius: 999px;
      filter: blur(90px);
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      width: 260px;
      height: 260px;
      top: -40px;
      left: -140px;
      background: rgba(223, 190, 145, 0.18);
      animation: ambientFloat 16s ease-in-out infinite;
    }

    body::after {
      width: 220px;
      height: 220px;
      right: -80px;
      bottom: 20px;
      background: rgba(236, 210, 184, 0.14);
      animation: ambientFloat 18s ease-in-out infinite reverse;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      width: min(980px, calc(100% - 84px));
      margin: 0 auto;
      padding: 42px 0;
      display: grid;
      place-items: center;
    }

    .hero {
      position: relative;
      width: 100%;
      min-height: calc(100vh - 68px);
      display: grid;
      place-items: center;
      padding: 48px 34px;
      background: transparent;
    }

    .hero-card {
      position: relative;
      width: min(620px, 100%);
      margin-top: 26px;
      padding: clamp(30px, 4vw, 42px) clamp(28px, 4.5vw, 46px) clamp(32px, 4vw, 44px);
      border-radius: 34px;
      border: 1px solid var(--line);
      text-align: center;
      background:
        linear-gradient(180deg, var(--paper), var(--paper-2)),
        radial-gradient(circle at 26% 20%, rgba(222, 196, 155, 0.09), transparent 24%);
      box-shadow: var(--card-shadow);
      animation:
        cardIn 1.2s cubic-bezier(.16,.84,.18,1) both,
        cardFloat 10.5s ease-in-out 1.2s infinite;
    }

    .hero-card::before {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.28);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.42),
        inset 0 0 24px rgba(255, 255, 255, 0.06),
        inset 0 -18px 34px rgba(231, 210, 184, 0.06);
      pointer-events: none;
    }

    .hero-card::after {
      content: "";
      position: absolute;
      left: 9%;
      right: 9%;
      bottom: -18px;
      height: 34px;
      border-radius: 999px;
      background: rgba(120, 83, 58, 0.15);
      filter: blur(20px);
      opacity: 0.62;
      pointer-events: none;
      z-index: -1;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 50px;
      padding: 11px 28px;
      border-radius: 999px;
      border: 1px solid rgba(182, 145, 101, 0.5);
      background: linear-gradient(180deg, rgba(240, 226, 206, 0.92), rgba(243, 232, 214, 0.86));
      box-shadow:
        0 12px 24px rgba(210, 176, 124, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.52);
      font-family: "Noto Serif TC", serif;
      font-size: 0.88rem;
      letter-spacing: 0.16em;
      color: var(--wine-soft);
      animation: badgeFloat 6.2s ease-in-out .35s infinite;
    }

    .hero-title {
      margin-top: 16px;
      font-family: "Noto Serif TC", serif;
      font-weight: 600;
      font-size: clamp(1.48rem, 2.4vw, 2.12rem);
      line-height: 1.22;
      letter-spacing: 0.02em;
      color: var(--wine);
      text-shadow:
        0 1px 0 rgba(255, 255, 255, 0.36),
        0 8px 18px rgba(137, 92, 72, 0.08);
      animation:
        titleIn 1.35s .2s cubic-bezier(.16,.84,.18,1) both,
        titleBreath 7.8s ease-in-out 1.2s infinite;
    }

    .hero-title .line {
      display: block;
      max-width: 7em;
      margin: 0 auto;
      animation: lineFloat 8.6s ease-in-out infinite;
    }

    .hero-subtitle {
      max-width: 16em;
      margin: 14px auto 0;
      font-family: "Noto Serif TC", serif;
      font-size: clamp(0.92rem, 1.4vw, 1.02rem);
      line-height: 1.72;
      letter-spacing: 0.12em;
      color: rgba(122, 91, 74, 0.9);
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.32);
      animation: fadeUp 1s .35s ease both;
    }

    .hero-actions {
      margin-top: 18px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      animation: fadeUp 1.1s .7s ease both;
    }

    .btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 148px;
      min-height: 56px;
      padding: 0 22px;
      border-radius: 999px;
      border: 0;
      text-decoration: none;
      font-family: "Noto Sans TC", sans-serif;
      font-size: 0.94rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: #fffdfa;
      background: linear-gradient(180deg, #cb8561 0%, #c57e5b 100%);
      box-shadow:
        0 16px 28px rgba(183, 117, 82, 0.22),
        0 0 24px rgba(225, 187, 149, 0.12);
      overflow: hidden;
      transition: transform .28s ease, box-shadow .28s ease, filter .28s ease;
      isolation: isolate;
    }

    .btn::before {
      content: "";
      position: absolute;
      inset: -32%;
      border-radius: inherit;
      background: radial-gradient(circle, rgba(255, 245, 228, 0.52) 0%, rgba(255, 245, 228, 0.22) 26%, rgba(255, 245, 228, 0) 64%);
      opacity: 0;
      transform: scale(0.72);
      z-index: 0;
      pointer-events: none;
    }

    .btn::after {
      content: "";
      position: absolute;
      inset: auto 14% 8px 14%;
      height: 16px;
      border-radius: 999px;
      background: rgba(255, 232, 212, 0.18);
      filter: blur(12px);
      opacity: .75;
      z-index: 1;
    }

    .btn span,
    .btn {
      position: relative;
      z-index: 2;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow:
        0 20px 34px rgba(183, 117, 82, 0.26),
        0 0 20px rgba(236, 194, 145, 0.14);
      filter: brightness(1.02);
    }

    .btn:active {
      transform: translateY(0) scale(0.985);
    }

    .btn.is-pressing::before {
      animation: buttonBloom .56s cubic-bezier(.18,.8,.22,1) forwards;
    }

    .btn.is-pressing {
      box-shadow:
        0 18px 30px rgba(183, 117, 82, 0.28),
        0 0 22px rgba(241, 207, 161, 0.18);
    }

    .btn-secondary {
      color: var(--wine);
      min-width: 126px;
      min-height: 48px;
      padding: 0 16px;
      background: rgba(255, 251, 246, 0.52);
      border: 1px solid rgba(142, 103, 78, 0.16);
      box-shadow:
        0 10px 20px rgba(103, 66, 39, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.4);
    }

    .btn-secondary::after {
      background: rgba(255, 245, 233, 0.12);
    }

    .btn-secondary:hover {
      box-shadow:
        0 14px 24px rgba(103, 66, 39, 0.12),
        0 0 14px rgba(233, 201, 156, 0.08);
    }

    @keyframes backgroundDrift {
      0% { background-position: center center, 50% 50%, center center; }
      50% { background-position: center center, 49% 47%, center center; }
      100% { background-position: center center, 52% 51%, center center; }
    }

    @keyframes ambientFloat {
      0%, 100% { transform: translate3d(0, 0, 0) scale(1); opacity: .8; }
      50% { transform: translate3d(18px, -16px, 0) scale(1.07); opacity: 1; }
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(.988); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes cardFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    @keyframes badgeFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }

    @keyframes titleIn {
      0% { opacity: 0; transform: translateY(16px); filter: blur(4px); }
      100% { opacity: 1; transform: translateY(0); filter: blur(0); }
    }

    @keyframes titleBreath {
      0%, 100% {
        text-shadow:
          0 1px 0 rgba(255, 255, 255, 0.36),
          0 12px 28px rgba(137, 92, 72, 0.08);
      }
      50% {
        text-shadow:
          0 1px 0 rgba(255, 255, 255, 0.4),
          0 16px 32px rgba(137, 92, 72, 0.12),
          0 0 22px rgba(220, 188, 139, 0.12);
      }
    }

    @keyframes lineFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
    }

    @keyframes wordGlow {
      0%, 100% { opacity: .55; transform: scaleX(.96); }
      50% { opacity: .92; transform: scaleX(1.04); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes buttonBloom {
      0% { opacity: 0; transform: scale(0.72); }
      38% { opacity: 1; }
      100% { opacity: 0; transform: scale(1.2); }
    }

    @media (max-width: 900px) {
      .page {
        width: min(100%, calc(100% - 28px));
        padding: 20px 0 28px;
      }

      .hero {
        min-height: calc(100vh - 42px);
        padding: 22px 6px 28px;
      }

      .hero-card {
        width: min(100%, calc(100% - 10px));
        margin-top: 22px;
        padding: 24px 20px 26px;
        border-radius: 24px;
        animation: cardIn 0.9s cubic-bezier(.16,.84,.18,1) both;
      }

      .hero-card::before {
        inset: 8px;
        border-radius: 20px;
      }

      .hero-card::after {
        left: 10%;
        right: 10%;
        bottom: -14px;
        height: 24px;
        filter: blur(14px);
        opacity: 0.5;
      }

      .hero-title {
        margin-top: 14px;
        font-size: clamp(1.28rem, 4.9vw, 1.64rem);
        line-height: 1.26;
        letter-spacing: 0.01em;
      }

      .hero-title .line {
        max-width: 5.9em;
      }

      .hero-subtitle {
        margin-top: 12px;
        font-size: 0.86rem;
        line-height: 1.62;
        letter-spacing: 0.08em;
      }

      .eyebrow {
        min-height: 44px;
        padding: 10px 18px;
        font-size: 0.8rem;
        letter-spacing: 0.12em;
      }

      .hero-actions {
        margin-top: 18px;
        gap: 10px;
      }

      .btn {
        width: min(240px, 100%);
        min-width: 0;
        min-height: 52px;
        padding: 0 18px;
        font-size: 0.88rem;
        letter-spacing: 0.1em;
      }

      .btn span {
        white-space: nowrap;
      }

      .btn-secondary {
        min-height: 44px;
        width: auto;
        padding: 0 14px;
        font-size: 0.82rem;
      }

      body::before,
      body::after {
        display: none;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="hero-card">
        <span class="eyebrow">八字戀愛交流聚</span>
        <h1 class="hero-title">
          <span class="line">八字戀愛交流聚</span>
        </h1>
        <p class="hero-subtitle">瞭解自己 吸引對的愛</p>
        <div class="hero-actions">
          <a class="btn" href="flow.html"><span>開始今日旅程</span></a>
          <a class="btn btn-secondary" href="leader.html"><span>關於帶領者</span></a>
        </div>
      </div>
    </section>
  </main>
  <script>
    document.querySelectorAll('a.btn[href]').forEach((link) => {
      link.addEventListener('click', (event) => {
        const href = link.getAttribute('href');
        if (!href || href.startsWith('#') || link.target === '_blank') {
          return;
        }
        event.preventDefault();
        link.classList.remove('is-pressing');
        void link.offsetWidth;
        link.classList.add('is-pressing');
        window.setTimeout(() => {
          window.location.href = href;
        }, 240);
      });
    });
  </script>
</body>
</html>
