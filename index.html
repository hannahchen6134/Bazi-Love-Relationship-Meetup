<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>八字戀愛能量交流小聚</title>
  <meta name="description" content="八字戀愛能量交流小聚首頁。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Noto+Serif+TC:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500&family=Parisienne&display=swap" rel="stylesheet" />
  <style>
    :root {
      --wine: #744038;
      --wine-soft: #916557;
      --text: #3d2f29;
      --text-soft: #736255;
      --paper: rgba(255, 249, 242, 0.965);
      --paper-2: rgba(255, 247, 238, 0.94);
      --line: rgba(136, 97, 73, 0.14);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      overflow-x: hidden;
      font-family: "Noto Sans TC", sans-serif;
      color: var(--text);
      background:
        linear-gradient(rgba(83, 58, 36, 0.18), rgba(83, 58, 36, 0.18)),
        url("floral-bg.png") center center / cover no-repeat,
        #f5ede2;
      animation: backgroundDrift 28s ease-in-out infinite alternate;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      border-radius: 999px;
      filter: blur(90px);
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      width: 320px;
      height: 320px;
      top: -40px;
      left: -140px;
      background: rgba(223, 190, 145, 0.22);
      animation: ambientFloat 16s ease-in-out infinite;
    }

    body::after {
      width: 260px;
      height: 260px;
      right: -80px;
      bottom: 20px;
      background: rgba(236, 210, 184, 0.16);
      animation: ambientFloat 18s ease-in-out infinite reverse;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      width: min(1080px, calc(100% - 26px));
      margin: 0 auto;
      padding: 22px 0;
      display: grid;
      place-items: center;
    }

    .hero {
      position: relative;
      width: 100%;
      min-height: calc(100vh - 44px);
      display: grid;
      place-items: center;
      padding: 32px 18px;
      background: transparent;
    }

    .hero-topline {
      position: absolute;
      top: 30px;
      left: 0;
      right: 0;
      text-align: center;
      font-family: "Cormorant Garamond", serif;
      font-size: 1rem;
      letter-spacing: 0.4em;
      color: rgba(93, 71, 53, 0.42);
      text-transform: lowercase;
      animation: toplinePulse 7.4s ease-in-out infinite;
    }

    .hero-card {
      position: relative;
      width: min(820px, calc(100% - 24px));
      margin-top: 34px;
      padding: clamp(38px, 5vw, 62px) clamp(24px, 5vw, 68px) clamp(40px, 6vw, 64px);
      border-radius: 34px;
      border: 1px solid var(--line);
      text-align: center;
      background:
        linear-gradient(180deg, var(--paper), var(--paper-2)),
        radial-gradient(circle at 26% 20%, rgba(222, 196, 155, 0.09), transparent 24%);
      box-shadow:
        0 38px 92px rgba(67, 42, 24, 0.2),
        0 12px 28px rgba(98, 66, 40, 0.08),
        0 0 34px rgba(232, 204, 160, 0.14),
        inset 0 1px 0 rgba(255, 255, 255, 0.72);
      animation:
        cardIn 1.2s cubic-bezier(.16,.84,.18,1) both,
        cardFloat 10.5s ease-in-out 1.2s infinite;
    }

    .hero-card::before {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.28);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.42),
        inset 0 0 24px rgba(255, 255, 255, 0.06),
        inset 0 -18px 34px rgba(231, 210, 184, 0.06);
      pointer-events: none;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 50px;
      padding: 11px 28px;
      border-radius: 999px;
      border: 1px solid rgba(182, 145, 101, 0.5);
      background: linear-gradient(180deg, rgba(240, 226, 206, 0.92), rgba(243, 232, 214, 0.86));
      box-shadow:
        0 12px 24px rgba(210, 176, 124, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.52);
      font-family: "Noto Serif TC", serif;
      font-size: 0.88rem;
      letter-spacing: 0.16em;
      color: var(--wine-soft);
      animation: badgeFloat 6.2s ease-in-out .35s infinite;
    }

    .ornament-script {
      margin-top: 22px;
      font-family: "Parisienne", cursive;
      font-size: clamp(1rem, 2vw, 1.45rem);
      letter-spacing: 0.34em;
      color: rgba(167, 137, 117, 0.38);
      opacity: 0.72;
      animation: scriptFloat 8.8s ease-in-out infinite;
      user-select: none;
    }

    .hero-title {
      margin-top: 18px;
      font-family: "Noto Serif TC", serif;
      font-weight: 600;
      font-size: clamp(2rem, 4.6vw, 3.85rem);
      line-height: 1.58;
      letter-spacing: 0.03em;
      color: var(--wine);
      text-shadow:
        0 1px 0 rgba(255, 255, 255, 0.36),
        0 12px 28px rgba(137, 92, 72, 0.08);
      animation:
        titleIn 1.35s .2s cubic-bezier(.16,.84,.18,1) both,
        titleBreath 7.8s ease-in-out 1.2s infinite;
    }

    .hero-title .line {
      display: block;
      animation: lineFloat 8.6s ease-in-out infinite;
    }

    .hero-title .line:nth-child(2) {
      animation-delay: .8s;
    }

    .glow-word {
      position: relative;
      display: inline-block;
    }

    .glow-word::after {
      content: "";
      position: absolute;
      left: -6%;
      right: -6%;
      bottom: 0.08em;
      height: 0.22em;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(212, 176, 125, 0), rgba(212, 176, 125, 0.22), rgba(212, 176, 125, 0));
      filter: blur(10px);
      opacity: 0.6;
      z-index: -1;
      animation: wordGlow 5.8s ease-in-out infinite;
    }

    .hero-actions {
      margin-top: 26px;
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      animation: fadeUp 1.1s .7s ease both;
    }

    .btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 174px;
      min-height: 62px;
      padding: 0 30px;
      border-radius: 999px;
      border: 0;
      text-decoration: none;
      font-family: "Noto Sans TC", sans-serif;
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: #fffdfa;
      background: linear-gradient(180deg, #cb8561 0%, #c57e5b 100%);
      box-shadow:
        0 16px 28px rgba(183, 117, 82, 0.22),
        0 0 24px rgba(225, 187, 149, 0.12);
      overflow: hidden;
      transition: transform .28s ease, box-shadow .28s ease, filter .28s ease;
      isolation: isolate;
    }

    .btn::before {
      content: "";
      position: absolute;
      inset: -32%;
      border-radius: inherit;
      background: radial-gradient(circle, rgba(255, 245, 228, 0.52) 0%, rgba(255, 245, 228, 0.22) 26%, rgba(255, 245, 228, 0) 64%);
      opacity: 0;
      transform: scale(0.72);
      z-index: 0;
      pointer-events: none;
    }

    .btn::after {
      content: "";
      position: absolute;
      inset: auto 14% 8px 14%;
      height: 16px;
      border-radius: 999px;
      background: rgba(255, 232, 212, 0.18);
      filter: blur(12px);
      opacity: .75;
      z-index: 1;
    }

    .btn span,
    .btn {
      position: relative;
      z-index: 2;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow:
        0 20px 34px rgba(183, 117, 82, 0.26),
        0 0 20px rgba(236, 194, 145, 0.14);
      filter: brightness(1.02);
    }

    .btn:active {
      transform: translateY(0) scale(0.985);
    }

    .btn.is-pressing::before {
      animation: buttonBloom .56s cubic-bezier(.18,.8,.22,1) forwards;
    }

    .btn.is-pressing {
      box-shadow:
        0 18px 30px rgba(183, 117, 82, 0.28),
        0 0 22px rgba(241, 207, 161, 0.18);
    }

    .btn-secondary {
      color: var(--wine);
      background: linear-gradient(180deg, rgba(255, 251, 246, 0.96), rgba(247, 238, 229, 0.92));
      box-shadow:
        0 14px 26px rgba(103, 66, 39, 0.12),
        0 0 18px rgba(229, 199, 159, 0.1);
    }

    .btn-secondary::after {
      background: rgba(255, 245, 233, 0.22);
    }

    @keyframes backgroundDrift {
      0% { background-position: center center, 50% 50%, center center; }
      50% { background-position: center center, 49% 47%, center center; }
      100% { background-position: center center, 52% 51%, center center; }
    }

    @keyframes ambientFloat {
      0%, 100% { transform: translate3d(0, 0, 0) scale(1); opacity: .8; }
      50% { transform: translate3d(18px, -16px, 0) scale(1.07); opacity: 1; }
    }

    @keyframes toplinePulse {
      0%, 100% { opacity: .58; letter-spacing: 0.4em; }
      50% { opacity: .94; letter-spacing: 0.44em; text-shadow: 0 0 22px rgba(255, 244, 225, 0.18); }
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(.988); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes cardFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    @keyframes badgeFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }

    @keyframes scriptFloat {
      0%, 100% { transform: translateY(0); opacity: .56; }
      50% { transform: translateY(-3px); opacity: .88; }
    }

    @keyframes titleIn {
      0% { opacity: 0; transform: translateY(16px); filter: blur(4px); }
      100% { opacity: 1; transform: translateY(0); filter: blur(0); }
    }

    @keyframes titleBreath {
      0%, 100% {
        text-shadow:
          0 1px 0 rgba(255, 255, 255, 0.36),
          0 12px 28px rgba(137, 92, 72, 0.08);
      }
      50% {
        text-shadow:
          0 1px 0 rgba(255, 255, 255, 0.4),
          0 16px 32px rgba(137, 92, 72, 0.12),
          0 0 22px rgba(220, 188, 139, 0.12);
      }
    }

    @keyframes lineFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
    }

    @keyframes wordGlow {
      0%, 100% { opacity: .55; transform: scaleX(.96); }
      50% { opacity: .92; transform: scaleX(1.04); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes buttonBloom {
      0% { opacity: 0; transform: scale(0.72); }
      38% { opacity: 1; }
      100% { opacity: 0; transform: scale(1.2); }
    }

    @media (max-width: 900px) {
      .page {
        width: min(100%, calc(100% - 14px));
        padding: 8px 0 14px;
      }

      .hero {
        min-height: calc(100vh - 22px);
        padding: 18px 6px 20px;
      }

      .hero-topline {
        top: 20px;
        font-size: 0.86rem;
        letter-spacing: 0.28em;
      }

      .hero-card {
        width: min(100%, calc(100% - 8px));
        margin-top: 26px;
        padding: 28px 16px 28px;
        border-radius: 24px;
      }

      .hero-card::before {
        inset: 8px;
        border-radius: 20px;
      }

      .ornament-script {
        margin-top: 14px;
        font-size: 0.9rem;
        letter-spacing: 0.18em;
      }

      .hero-title {
        margin-top: 14px;
        font-size: clamp(1.72rem, 7.9vw, 2.45rem);
        line-height: 1.68;
        letter-spacing: 0.015em;
      }

      .eyebrow {
        min-height: 44px;
        padding: 10px 18px;
        font-size: 0.8rem;
        letter-spacing: 0.12em;
      }

      .hero-actions {
        margin-top: 22px;
        gap: 10px;
      }

      .btn {
        width: 100%;
        min-width: 0;
        min-height: 56px;
        padding: 0 18px;
        font-size: 0.92rem;
        letter-spacing: 0.14em;
      }

      .btn span {
        white-space: nowrap;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="hero-topline">starry dawn circle</div>
      <div class="hero-card">
        <span class="eyebrow">八字戀愛能量交流小聚</span>
        <div class="ornament-script">softly into bloom</div>
        <h1 class="hero-title">
          <span class="line">如果感情像一座<span class="glow-word">花園</span>，</span>
          <span class="line">我會用什麼方式靠近愛？</span>
        </h1>
        <div class="hero-actions">
          <a class="btn" href="flow.html"><span>開始今日旅程</span></a>
          <a class="btn btn-secondary" href="leader.html"><span>關於帶領者</span></a>
        </div>
      </div>
    </section>
  </main>
  <script>
    document.querySelectorAll('a.btn[href]').forEach((link) => {
      link.addEventListener('click', (event) => {
        const href = link.getAttribute('href');
        if (!href || href.startsWith('#') || link.target === '_blank') {
          return;
        }
        event.preventDefault();
        link.classList.remove('is-pressing');
        void link.offsetWidth;
        link.classList.add('is-pressing');
        window.setTimeout(() => {
          window.location.href = href;
        }, 240);
      });
    });
  </script>
</body>
</html>
