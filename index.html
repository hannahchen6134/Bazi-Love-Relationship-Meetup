<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>八字戀愛交流聚</title>
  <meta name="description" content="八字戀愛交流聚，瞭解自己，吸引對的愛。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Noto+Serif+TC:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500&family=Parisienne&display=swap" rel="stylesheet" />
  <style>
    :root {
      --wine: #744038;
      --wine-soft: #916557;
      --text: #3d2f29;
      --text-soft: #736255;
      --paper: rgba(255, 249, 242, 0.965);
      --paper-2: rgba(255, 247, 238, 0.94);
      --line: rgba(136, 97, 73, 0.14);
      --card-shadow-lift:
        0 38px 78px rgba(66, 40, 25, 0.18),
        0 18px 34px rgba(98, 66, 40, 0.1),
        0 2px 8px rgba(142, 99, 72, 0.06);
      --card-shadow:
        0 28px 60px rgba(66, 40, 25, 0.16),
        0 12px 24px rgba(98, 66, 40, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.72);
      --card-shadow-soft:
        0 18px 34px rgba(87, 55, 34, 0.12),
        0 8px 16px rgba(120, 83, 58, 0.06);
      --button-shadow:
        0 16px 26px rgba(109, 71, 53, 0.16),
        0 6px 12px rgba(151, 107, 82, 0.1),
        0 0 0 1px rgba(124, 84, 64, 0.05);
      --button-shadow-hover:
        0 18px 28px rgba(109, 71, 53, 0.18),
        0 8px 14px rgba(151, 107, 82, 0.11),
        0 0 0 1px rgba(124, 84, 64, 0.07);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      overflow-x: hidden;
      font-family: "Noto Sans TC", sans-serif;
      color: var(--text);
      background:
        linear-gradient(rgba(83, 58, 36, 0.18), rgba(83, 58, 36, 0.18)),
        url("floral-bg.png") center center / cover no-repeat,
        #f5ede2;
      animation: backgroundDrift 28s ease-in-out infinite alternate;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      border-radius: 999px;
      filter: blur(90px);
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      width: 260px;
      height: 260px;
      top: -40px;
      left: -140px;
      background: rgba(223, 190, 145, 0.18);
      animation: ambientFloat 16s ease-in-out infinite;
    }

    body::after {
      width: 220px;
      height: 220px;
      right: -80px;
      bottom: 20px;
      background: rgba(236, 210, 184, 0.14);
      animation: ambientFloat 18s ease-in-out infinite reverse;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      width: min(980px, calc(100% - 84px));
      margin: 0 auto;
      padding: 42px 0;
      display: grid;
      place-items: center;
    }

    .hero {
      position: relative;
      width: 100%;
      min-height: calc(100vh - 68px);
      display: grid;
      place-items: center;
      padding: 84px 34px 48px;
      background: transparent;
    }

    .hero-card {
      position: relative;
      width: min(620px, 100%);
      margin-top: 26px;
      padding: clamp(58px, 6vw, 74px) clamp(28px, 4.5vw, 46px) clamp(32px, 4vw, 44px);
      border-radius: 34px;
      border: 1px solid rgba(151, 116, 89, 0.16);
      text-align: center;
      background:
        linear-gradient(180deg, rgba(255, 251, 246, 0.985), rgba(251, 244, 237, 0.965)),
        radial-gradient(circle at 26% 20%, rgba(222, 196, 155, 0.11), transparent 24%);
      box-shadow:
        0 40px 88px rgba(72, 44, 27, 0.2),
        0 18px 36px rgba(115, 77, 53, 0.12),
        0 2px 10px rgba(164, 122, 92, 0.06);
      animation:
        cardIn 1.2s cubic-bezier(.16,.84,.18,1) both,
        cardFloat 10.5s ease-in-out 1.2s infinite;
    }

    .hero-card::before {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.42);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.62),
        inset 0 0 28px rgba(255, 255, 255, 0.08),
        inset 0 -20px 36px rgba(231, 210, 184, 0.08),
        0 0 0 1px rgba(245, 231, 216, 0.18);
      pointer-events: none;
    }

    .hero-card::after {
      content: "";
      position: absolute;
      left: 8%;
      right: 8%;
      bottom: -22px;
      height: 42px;
      border-radius: 999px;
      background:
        radial-gradient(ellipse at center, rgba(118, 82, 58, 0.22) 0%, rgba(118, 82, 58, 0.12) 42%, rgba(118, 82, 58, 0) 78%);
      filter: blur(24px);
      opacity: 0.9;
      pointer-events: none;
      z-index: -1;
    }

    .hero-title {
      margin-top: 0;
      font-family: "Noto Serif TC", serif;
      font-weight: 600;
      font-size: clamp(1.82rem, 3vw, 2.7rem);
      line-height: 1.14;
      letter-spacing: 0.04em;
      color: var(--wine);
      text-shadow:
        0 1px 0 rgba(255, 255, 255, 0.36),
        0 8px 18px rgba(137, 92, 72, 0.08);
      overflow: hidden;
    }

    .hero-title .line {
      display: block;
      max-width: 8em;
      margin: 0 auto;
      opacity: 0;
      transform: translateY(40px) scale(0.92);
      filter: blur(10px);
      animation-fill-mode: forwards;
    }

    .hero-title .line-main {
      font-size: 1.12em;
      letter-spacing: 0.12em;
      animation:
        heroTitleReveal 1.14s .16s cubic-bezier(.16,.84,.18,1) forwards,
        titleBreath 7.8s ease-in-out 1.35s infinite,
        lineFloat 8.6s ease-in-out 1.35s infinite;
    }

    .hero-title .line-sub {
      margin-top: 2px;
      font-size: 0.9em;
      letter-spacing: 0.16em;
      animation:
        heroTitleRevealSoft 1.08s .34s cubic-bezier(.16,.84,.18,1) forwards,
        titleBreath 7.8s ease-in-out 1.5s infinite,
        lineFloat 8.6s ease-in-out 1.5s infinite;
    }

    .hero-script {
      position: absolute;
      top: 12px;
      left: 0;
      right: 0;
      z-index: 2;
      width: 100%;
      display: block;
      transform: none;
      font-family: "Parisienne", cursive;
      font-size: clamp(0.74rem, 1vw, 0.9rem);
      line-height: 1;
      color: rgba(146, 118, 99, 0.76);
      letter-spacing: 0.34em;
      word-spacing: 0.42em;
      text-align: center;
      white-space: nowrap;
      transform-origin: center;
      animation: fadeUp 1s .3s ease both;
      pointer-events: none;
      user-select: none;
    }

    .hero-subtitle {
      display: none;
    }

    .hero-actions {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      animation: fadeUp 1.1s .7s ease both;
    }

    .hero-title,
    .hero-title .line {
      user-select: none;
    }

    .btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 188px;
      min-width: 188px;
      min-height: 50px;
      padding: 0 18px;
      border-radius: 999px;
      border: 1px solid rgba(132, 91, 72, 0.14);
      text-decoration: none;
      font-family: "Noto Serif TC", serif;
      font-size: 0.98rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: #fff9f2;
      background:
        linear-gradient(180deg, rgba(241, 215, 193, 0.32), rgba(235, 204, 179, 0.12) 28%, rgba(206, 151, 120, 0.04) 100%),
        linear-gradient(135deg, #b97b5d 0%, #ad6f56 52%, #9e654d 100%);
      box-shadow:
        0 10px 18px rgba(109, 71, 53, 0.12),
        0 4px 8px rgba(151, 107, 82, 0.06),
        0 0 0 1px rgba(124, 84, 64, 0.04);
      overflow: hidden;
      transition: transform .28s ease, box-shadow .28s ease, filter .28s ease;
      isolation: isolate;
      text-shadow: 0 1px 0 rgba(96, 54, 39, 0.18);
    }

    .btn::before {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: inherit;
      background:
        linear-gradient(180deg, rgba(255, 247, 239, 0.14), rgba(255, 247, 239, 0.04) 30%, rgba(255, 247, 239, 0) 56%);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.18),
        inset 0 -5px 10px rgba(107, 62, 45, 0.05);
      opacity: .92;
      z-index: 0;
      pointer-events: none;
    }

    .btn::after {
      content: "";
      position: absolute;
      inset: auto 20% 6px 20%;
      height: 10px;
      border-radius: 999px;
      background: rgba(92, 57, 43, 0.08);
      filter: blur(8px);
      opacity: .22;
      z-index: 1;
    }

    .btn span,
    .btn {
      position: relative;
      z-index: 2;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow:
        0 12px 20px rgba(109, 71, 53, 0.14),
        0 5px 10px rgba(151, 107, 82, 0.07),
        0 0 0 1px rgba(124, 84, 64, 0.05);
      filter: brightness(1.01);
    }

    .btn:active {
      transform: translateY(0) scale(0.985);
    }

    .btn.is-pressing::before {
      animation: buttonBloom .56s cubic-bezier(.18,.8,.22,1) forwards;
    }

    .btn.is-pressing {
      box-shadow:
        0 10px 16px rgba(109, 71, 53, 0.14),
        0 4px 8px rgba(151, 107, 82, 0.08);
    }

    .btn-secondary {
      color: var(--wine);
      min-width: 188px;
      min-height: 50px;
      padding: 0 18px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.68), rgba(246, 239, 232, 0.7));
      border: 1px solid rgba(153, 120, 101, 0.12);
      box-shadow:
        0 8px 16px rgba(103, 66, 39, 0.06),
        inset 0 1px 0 rgba(255, 255, 255, 0.3);
      text-shadow: none;
    }

    .btn-secondary::after {
      background: rgba(112, 83, 68, 0.06);
    }

    .btn-secondary:hover {
      box-shadow:
        0 12px 20px rgba(103, 66, 39, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 0.5);
    }

    @keyframes backgroundDrift {
      0% { background-position: center center, 50% 50%, center center; }
      50% { background-position: center center, 49% 47%, center center; }
      100% { background-position: center center, 52% 51%, center center; }
    }

    @keyframes ambientFloat {
      0%, 100% { transform: translate3d(0, 0, 0) scale(1); opacity: .8; }
      50% { transform: translate3d(18px, -16px, 0) scale(1.07); opacity: 1; }
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(.988); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes cardFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    @keyframes badgeFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }

    @keyframes titleIn {
      0% { opacity: 0; transform: translateY(16px); filter: blur(4px); }
      100% { opacity: 1; transform: translateY(0); filter: blur(0); }
    }

    @keyframes titleBreath {
      0%, 100% {
        text-shadow:
          0 1px 0 rgba(255, 255, 255, 0.36),
          0 12px 28px rgba(137, 92, 72, 0.08);
      }
      50% {
        text-shadow:
          0 1px 0 rgba(255, 255, 255, 0.4),
          0 16px 32px rgba(137, 92, 72, 0.12),
          0 0 22px rgba(220, 188, 139, 0.12);
      }
    }

    @keyframes lineFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
    }

    @keyframes heroTitleReveal {
      0% { opacity: 0; transform: translateY(40px) scale(0.92); filter: blur(10px); letter-spacing: 0.22em; }
      65% { opacity: 1; transform: translateY(-4px) scale(1.02); filter: blur(0); letter-spacing: 0.07em; }
      100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); letter-spacing: 0.04em; }
    }

    @keyframes heroTitleRevealSoft {
      0% { opacity: 0; transform: translateY(30px) scale(0.95); filter: blur(8px); letter-spacing: 0.24em; }
      70% { opacity: 1; transform: translateY(-2px) scale(1.01); filter: blur(0); letter-spacing: 0.14em; }
      100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); letter-spacing: 0.16em; }
    }

    @keyframes wordGlow {
      0%, 100% { opacity: .55; transform: scaleX(.96); }
      50% { opacity: .92; transform: scaleX(1.04); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes buttonBloom {
      0% { opacity: 0; transform: scale(0.72); }
      38% { opacity: 1; }
      100% { opacity: 0; transform: scale(1.2); }
    }

    @media (max-width: 900px) {
      .page {
        width: min(100%, calc(100% - 28px));
        padding: 20px 0 28px;
      }

      .hero {
        min-height: calc(100vh - 42px);
        padding: 68px 6px 28px;
      }

      .hero-card {
        width: min(100%, calc(100% - 10px));
        margin-top: 22px;
        padding: 52px 20px 26px;
        border-radius: 24px;
        box-shadow:
          0 30px 56px rgba(72, 44, 27, 0.18),
          0 12px 24px rgba(115, 77, 53, 0.1),
          0 2px 8px rgba(164, 122, 92, 0.05);
        animation: cardIn 0.9s cubic-bezier(.16,.84,.18,1) both;
      }

      .hero-card::before {
        inset: 8px;
        border-radius: 20px;
      }

      .hero-card::after {
        left: 9%;
        right: 9%;
        bottom: -16px;
        height: 28px;
        filter: blur(18px);
        opacity: 0.72;
      }

      .hero-title {
        margin-top: 0;
        font-size: clamp(1.54rem, 6vw, 2rem);
        line-height: 1.18;
        letter-spacing: 0.02em;
      }

      .hero-script {
        top: 12px;
        width: 100%;
        font-size: 0.62rem;
        letter-spacing: 0.28em;
        word-spacing: 0.34em;
      }

      .hero-title .line {
        max-width: 5.9em;
      }

      .hero-title .line-main {
        font-size: 1.16em;
      }

      .hero-title .line-sub {
        font-size: 0.88em;
      }

      .hero-actions {
        margin-top: 18px;
        gap: 8px;
      }

      .btn {
        width: 176px;
        min-width: 176px;
        min-height: 46px;
        padding: 0 14px;
        font-size: 0.88rem;
        letter-spacing: 0.1em;
      }

      .btn span {
        white-space: nowrap;
      }

      .btn-secondary {
        min-height: 46px;
        width: 176px;
        min-width: 176px;
        padding: 0 14px;
        font-size: 0.82rem;
      }

      body::before,
      body::after {
        display: none;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="hero-card">
        <div class="hero-script">starry dawn circle</div>
        <h1 class="hero-title">
          <span class="line line-main">八字戀愛</span>
          <span class="line line-sub">交流聚</span>
        </h1>
        <div class="hero-actions">
          <a class="btn btn-primary" href="flow.html"><span>開始今日旅程</span></a>
          <a class="btn btn-secondary" href="leader.html"><span>關於帶領者</span></a>
          <a class="btn btn-secondary" href="https://app.notion.com/p/2c1e018a12df80bb9ad3e25689338bfc?source=copy_link" target="_blank" rel="noreferrer"><span>關於初星群</span></a>
        </div>
      </div>
    </section>
  </main>
  <script>
    document.querySelectorAll('a.btn[href]').forEach((link) => {
      link.addEventListener('click', (event) => {
        const href = link.getAttribute('href');
        if (!href || href.startsWith('#') || link.target === '_blank') {
          return;
        }
        event.preventDefault();
        link.classList.remove('is-pressing');
        void link.offsetWidth;
        link.classList.add('is-pressing');
        window.setTimeout(() => {
          window.location.href = href;
        }, 240);
      });
    });
  </script>
</body>
</html>
