<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>關於帶領者</title>
  <meta name="description" content="八字戀愛交流聚帶領者介紹。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Noto+Serif+TC:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --wine: #744038;
      --wine-soft: #9f6c56;
      --text: #3c2c25;
      --text-soft: #68554a;
      --paper: rgba(255, 249, 242, 0.95);
      --paper-2: rgba(255, 246, 237, 0.92);
      --line: rgba(136, 97, 73, 0.12);
      --glow: rgba(228, 193, 153, 0.2);
      --shadow:
        0 28px 68px rgba(67, 42, 24, 0.16),
        0 12px 28px rgba(98, 66, 40, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.74);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      font-family: "Noto Sans TC", sans-serif;
      color: var(--text);
      background:
        linear-gradient(rgba(83, 58, 36, 0.18), rgba(83, 58, 36, 0.18)),
        url("floral-bg.png") center center / cover no-repeat,
        #f5ede2;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      border-radius: 999px;
      filter: blur(72px);
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      width: 260px;
      height: 260px;
      top: -40px;
      left: -110px;
      background: rgba(234, 198, 157, 0.18);
    }

    body::after {
      width: 220px;
      height: 220px;
      right: -80px;
      bottom: 30px;
      background: rgba(244, 214, 188, 0.16);
    }

    .home-btn {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 4;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 112px;
      min-height: 48px;
      padding: 0 18px;
      border-radius: 999px;
      border: 1px solid rgba(142, 103, 78, 0.16);
      text-decoration: none;
      color: var(--wine);
      letter-spacing: 0.06em;
      background: linear-gradient(180deg, rgba(255, 250, 245, 0.96), rgba(249, 242, 234, 0.92));
      box-shadow:
        0 14px 28px rgba(103, 66, 39, 0.12),
        0 0 18px rgba(229, 199, 159, 0.1);
      backdrop-filter: blur(8px);
    }

    .page {
      position: relative;
      z-index: 1;
      width: min(980px, calc(100% - 84px));
      margin: 0 auto;
      padding: 52px 0 46px;
      animation: pageFade .9s ease both;
    }

    .sheet {
      position: relative;
      overflow: hidden;
      border-radius: 36px;
      border: 1px solid var(--line);
      background:
        linear-gradient(180deg, var(--paper), var(--paper-2)),
        radial-gradient(circle at 18% 16%, rgba(226, 197, 157, 0.16), transparent 22%);
      box-shadow: var(--shadow);
    }

    .sheet::before {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.28);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.36),
        inset 0 0 22px rgba(255, 255, 255, 0.06);
      pointer-events: none;
    }

    .sheet::after {
      content: "";
      position: absolute;
      left: 8%;
      right: 8%;
      bottom: -18px;
      height: 34px;
      border-radius: 999px;
      background: rgba(123, 84, 58, 0.14);
      filter: blur(22px);
      opacity: 0.55;
      pointer-events: none;
    }

    .hero {
      padding: 42px 42px 20px;
      text-align: center;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 10px 24px;
      border-radius: 999px;
      border: 1px solid rgba(182, 145, 101, 0.48);
      background: linear-gradient(180deg, rgba(240, 226, 206, 0.92), rgba(243, 232, 214, 0.86));
      font-family: "Noto Serif TC", serif;
      font-size: 0.9rem;
      letter-spacing: 0.16em;
      color: var(--wine-soft);
    }

    .hero-title {
      max-width: 7em;
      margin: 22px auto 0;
      font-family: "Noto Serif TC", serif;
      font-size: clamp(1.8rem, 3.6vw, 3rem);
      line-height: 1.16;
      letter-spacing: 0.04em;
      color: var(--wine);
      text-shadow: 0 8px 20px rgba(137, 92, 72, 0.08);
    }

    .hero-copy {
      max-width: 30em;
      margin: 16px auto 0;
      font-size: 0.98rem;
      line-height: 1.9;
      color: var(--text-soft);
    }

    .leaders {
      display: grid;
      gap: 24px;
      padding: 8px 34px 34px;
      animation: fadeUp .9s .18s ease both;
    }

    .leader-card {
      position: relative;
      display: grid;
      grid-template-columns: 220px minmax(0, 1fr);
      gap: 34px;
      align-items: center;
      padding: 28px;
      border-radius: 30px;
      border: 1px solid rgba(136, 97, 73, 0.1);
      background:
        linear-gradient(180deg, rgba(255, 252, 248, 0.84), rgba(255, 247, 239, 0.76)),
        radial-gradient(circle at 14% 20%, var(--glow), transparent 26%);
      box-shadow:
        0 18px 34px rgba(88, 57, 33, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.6);
      animation: fadeUp .85s ease both;
    }

    .leader-card:nth-child(2) {
      animation-delay: .12s;
    }

    .leader-card::after {
      content: "";
      position: absolute;
      left: 12%;
      right: 12%;
      bottom: -12px;
      height: 24px;
      border-radius: 999px;
      background: rgba(135, 96, 70, 0.1);
      filter: blur(16px);
      opacity: 0.5;
      pointer-events: none;
    }

    .portrait-wrap {
      position: relative;
      width: 220px;
      aspect-ratio: 1;
      margin: 0 auto;
      border-radius: 50%;
      padding: 10px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(248, 238, 230, 0.92)),
        radial-gradient(circle at center, rgba(236, 205, 162, 0.3), transparent 62%);
      box-shadow:
        0 18px 30px rgba(96, 63, 39, 0.12),
        0 0 28px rgba(236, 204, 161, 0.14);
    }

    .portrait-wrap::after {
      content: "";
      position: absolute;
      inset: 6px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.52);
      pointer-events: none;
    }

    .portrait {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .leader-content {
      text-align: left;
    }

    .leader-name-row {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 10px 18px;
    }

    .leader-name {
      font-family: "Noto Serif TC", serif;
      font-size: clamp(2rem, 3vw, 2.9rem);
      line-height: 1.1;
      color: var(--wine);
    }

    .leader-role {
      font-family: "Noto Serif TC", serif;
      font-size: clamp(1rem, 1.6vw, 1.18rem);
      line-height: 1.7;
      color: var(--wine-soft);
      letter-spacing: 0.06em;
    }

    .leader-desc {
      margin-top: 18px;
      font-size: 1.05rem;
      line-height: 1.9;
      color: var(--text);
    }

    .leader-desc strong {
      color: var(--wine);
      font-weight: 600;
    }

    .actions {
      display: flex;
      justify-content: center;
      padding: 0 34px 36px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 168px;
      min-height: 58px;
      padding: 0 28px;
      border-radius: 999px;
      text-decoration: none;
      color: var(--wine);
      letter-spacing: 0.12em;
      background: linear-gradient(180deg, rgba(255, 251, 246, 0.96), rgba(247, 238, 229, 0.92));
      box-shadow:
        0 14px 26px rgba(103, 66, 39, 0.12),
        0 0 18px rgba(229, 199, 159, 0.1);
      transition: transform .28s ease, box-shadow .28s ease, filter .28s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow:
        0 18px 30px rgba(103, 66, 39, 0.14),
        0 0 18px rgba(233, 201, 156, 0.12);
      filter: brightness(1.01);
    }

    @keyframes pageFade {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 900px) {
      body::before,
      body::after {
        display: none;
      }

      .home-btn {
        top: 10px;
        right: 10px;
        min-width: 96px;
        min-height: 42px;
        padding: 0 14px;
        font-size: 0.84rem;
      }

      .page {
        width: min(100%, calc(100% - 28px));
        padding: 62px 0 20px;
      }

      .sheet {
        border-radius: 26px;
      }

      .sheet::before {
        inset: 8px;
        border-radius: 20px;
      }

      .sheet::after {
        left: 10%;
        right: 10%;
        bottom: -12px;
        height: 20px;
        filter: blur(14px);
      }

      .hero {
        padding: 28px 18px 16px;
      }

      .eyebrow {
        min-height: 42px;
        padding: 10px 18px;
        font-size: 0.8rem;
        letter-spacing: 0.12em;
      }

      .hero-title {
        margin-top: 16px;
        font-size: clamp(1.56rem, 6.8vw, 2.18rem);
        line-height: 1.18;
      }

      .hero-copy {
        margin-top: 12px;
        font-size: 0.9rem;
        line-height: 1.78;
      }

      .leaders {
        gap: 18px;
        padding: 4px 16px 20px;
      }

      .leader-card {
        grid-template-columns: 1fr;
        gap: 18px;
        padding: 20px 16px;
        border-radius: 22px;
        text-align: center;
      }

      .leader-card::after {
        left: 14%;
        right: 14%;
        bottom: -10px;
        height: 18px;
        filter: blur(12px);
      }

      .portrait-wrap {
        width: min(200px, 58vw);
      }

      .leader-content {
        text-align: center;
      }

      .leader-name-row {
        justify-content: center;
        gap: 8px 10px;
      }

      .leader-name {
        font-size: clamp(1.75rem, 8vw, 2.3rem);
      }

      .leader-role {
        width: 100%;
        font-size: 0.96rem;
        line-height: 1.7;
      }

      .leader-desc {
        margin-top: 12px;
        font-size: 0.95rem;
        line-height: 1.84;
      }

      .actions {
        padding: 0 16px 22px;
      }

      .btn {
        width: min(240px, 100%);
        min-width: 0;
        min-height: 54px;
        padding: 0 18px;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <a class="home-btn" href="index.html">回到首頁</a>

  <main class="page">
    <section class="sheet">
      <header class="hero">
        <div class="eyebrow">關於帶領者</div>
        <h1 class="hero-title">會由誰帶你<br />一起探索？</h1>
        <p class="hero-copy">這場交流聚會用溫柔而清晰的方式，陪你理解自己在愛裡的能量、靠近方式與互動節奏。</p>
      </header>

      <section class="leaders">
        <article class="leader-card">
          <div class="portrait-wrap">
            <img class="portrait" src="leader-zhihui.jpg" alt="智堯" />
          </div>
          <div class="leader-content">
            <div class="leader-name-row">
              <h2 class="leader-name">智堯</h2>
              <p class="leader-role">八字命理師 / 美國 NGH 催眠師</p>
            </div>
            <p class="leader-desc">服務八字命理個案數百位，用白話方式帶你看懂八字，解析你的戀愛能量與行動方向。</p>
          </div>
        </article>

        <article class="leader-card">
          <div class="portrait-wrap">
            <img class="portrait" src="leader-qingqing.png" alt="青青" />
          </div>
          <div class="leader-content">
            <div class="leader-name-row">
              <h2 class="leader-name">青青</h2>
              <p class="leader-role">初星群 社群主持人</p>
            </div>
            <p class="leader-desc">現場帶領交流、陪伴與引導，讓大家在輕鬆安全的氛圍自在分享。</p>
          </div>
        </article>
      </section>

      <div class="actions">
        <a class="btn" href="index.html">回到首頁</a>
      </div>
    </section>
  </main>
</body>
</html>
