<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>關於帶領者</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Noto+Serif+TC:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500&family=Parisienne&display=swap" rel="stylesheet" />
  <style>
    :root {
      --wine: #744038;
      --wine-soft: #8f675b;
      --text: #3c2e28;
      --text-soft: #6f6054;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: "Noto Sans TC", sans-serif;
      color: var(--text);
      background:
        linear-gradient(rgba(83, 58, 36, 0.18), rgba(83, 58, 36, 0.18)),
        url("floral-bg.png") center center / cover no-repeat,
        #f5ede2;
    }
    .page {
      min-height: 100vh;
      width: min(980px, calc(100% - 24px));
      margin: 0 auto;
      padding: 24px 0;
      display: grid;
      place-items: center;
    }
    .card {
      width: min(760px, 100%);
      padding: clamp(34px, 5vw, 56px);
      border-radius: 34px;
      border: 1px solid rgba(136, 97, 73, 0.14);
      background: linear-gradient(180deg, rgba(255,249,242,.965), rgba(255,247,238,.94));
      box-shadow:
        0 30px 72px rgba(67, 42, 24, 0.15),
        0 0 26px rgba(232, 204, 160, 0.1),
        inset 0 1px 0 rgba(255,255,255,.72);
      text-align: center;
    }
    .eyebrow {
      display: inline-flex;
      min-height: 46px;
      align-items: center;
      justify-content: center;
      padding: 10px 24px;
      border-radius: 999px;
      border: 1px solid rgba(182,145,101,.5);
      background: linear-gradient(180deg, rgba(240,226,206,.92), rgba(243,232,214,.86));
      color: var(--wine-soft);
      font-family: "Noto Serif TC", serif;
      font-size: .86rem;
      letter-spacing: .14em;
    }
    .script {
      margin-top: 18px;
      font-family: "Parisienne", cursive;
      font-size: 1.2rem;
      letter-spacing: .28em;
      color: rgba(167,137,117,.4);
    }
    h1 {
      margin-top: 18px;
      font-family: "Noto Serif TC", serif;
      font-size: clamp(2rem, 4.3vw, 3.2rem);
      line-height: 1.5;
      color: var(--wine);
    }
    .lead {
      max-width: 520px;
      margin: 20px auto 0;
      font-size: .96rem;
      line-height: 1.9;
      color: var(--text-soft);
    }
    .bio {
      max-width: 560px;
      margin: 24px auto 0;
      padding: 18px 18px 16px;
      border-radius: 22px;
      border: 1px solid rgba(136, 97, 73, 0.1);
      background: rgba(255, 252, 248, 0.64);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.62);
      text-align: left;
    }
    .bio p {
      font-size: .95rem;
      line-height: 1.92;
      color: var(--text-soft);
    }
    .actions {
      margin-top: 28px;
      display: flex;
      justify-content: center;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 152px;
      min-height: 56px;
      padding: 0 26px;
      border-radius: 999px;
      text-decoration: none;
      color: var(--wine);
      letter-spacing: .12em;
      background: linear-gradient(180deg, rgba(255, 251, 246, 0.96), rgba(247, 238, 229, 0.92));
      box-shadow:
        0 14px 26px rgba(103, 66, 39, 0.12),
        0 0 18px rgba(229, 199, 159, 0.1);
    }

    @media (max-width: 900px) {
      .page {
        width: min(100%, calc(100% - 14px));
        padding: 14px 0;
      }

      .card {
        padding: 28px 16px 30px;
        border-radius: 24px;
      }

      .eyebrow {
        min-height: 42px;
        padding: 10px 18px;
        font-size: 0.8rem;
        letter-spacing: 0.12em;
      }

      .script {
        margin-top: 14px;
        font-size: 0.96rem;
        letter-spacing: 0.2em;
      }

      h1 {
        margin-top: 16px;
        font-size: clamp(1.7rem, 7.8vw, 2.5rem);
        line-height: 1.62;
      }

      .lead,
      .bio p {
        font-size: 0.9rem;
        line-height: 1.84;
      }

      .bio {
        margin-top: 20px;
        padding: 16px 14px 14px;
        border-radius: 18px;
      }

      .actions {
        margin-top: 22px;
      }

      .btn {
        width: 100%;
        min-width: 0;
        min-height: 54px;
        padding: 0 18px;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="card">
      <div class="eyebrow">關於帶領者</div>
      <div class="script">guided with warmth</div>
      <h1>陪你慢慢看見自己<br />在關係裡的樣子</h1>
      <p class="lead">這一頁可以放帶領者簡介、陪伴風格，還有你希望參與者在活動開始前先認識的話。</p>
      <div class="bio">
        <p>你可以在這裡補上帶領者名稱、相關背景、擅長的陪伴方式，或是一小段想對參與者說的話。整體會更像一場被溫柔接住的邀請，而不是制式介紹。</p>
      </div>
      <div class="actions">
        <a class="btn" href="index.html">回到首頁</a>
      </div>
    </section>
  </main>
</body>
</html>
