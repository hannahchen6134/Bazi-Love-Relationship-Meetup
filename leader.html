<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>關於帶領者｜八字戀愛交流聚</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Noto+Serif+TC:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --cream: #f6efe8;
        --cream-soft: rgba(252, 247, 241, 0.94);
        --wine: #8d5a4c;
        --wine-soft: #b78a72;
        --text: #6d4f43;
        --line: rgba(160, 128, 103, 0.16);
        --olive: #7f8960;
        --shadow-lg: 0 34px 78px rgba(78, 53, 34, 0.18);
        --shadow-md: 0 14px 30px rgba(105, 73, 51, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: "Noto Serif TC", serif;
        color: var(--text);
        background:
          linear-gradient(rgba(89, 58, 31, 0.38), rgba(89, 58, 31, 0.38)),
          url("floral-bg.png") center / cover fixed no-repeat;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(circle at top, rgba(255, 245, 231, 0.26), transparent 34%),
          linear-gradient(180deg, rgba(255, 250, 245, 0.06), rgba(255, 250, 245, 0));
        pointer-events: none;
      }

      a {
        color: inherit;
      }

      .page {
        position: relative;
        width: min(1100px, calc(100% - 40px));
        margin: 0 auto;
        padding: 34px 0 64px;
      }

      .topbar {
        display: flex;
        justify-content: flex-end;
        margin-bottom: 14px;
      }

      .back-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 40px;
        padding: 0 16px;
        border-radius: 999px;
        text-decoration: none;
        color: var(--wine);
        border: 1px solid rgba(151, 116, 89, 0.13);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(247, 240, 233, 0.9));
        box-shadow:
          0 8px 16px rgba(86, 58, 35, 0.06),
          0 2px 6px rgba(126, 92, 69, 0.035),
          inset 0 1px 0 rgba(255, 255, 255, 0.72);
        font-size: 0.82rem;
        letter-spacing: 0.05em;
      }

      .leaders {
        display: grid;
        gap: 22px;
      }

      .leader-card {
        position: relative;
        overflow: hidden;
        display: grid;
        grid-template-columns: 270px minmax(0, 1fr);
        gap: 26px;
        align-items: center;
        padding: 38px 34px;
        border-radius: 36px;
        border: 1px solid rgba(151, 116, 89, 0.14);
        background:
          linear-gradient(180deg, rgba(255, 251, 247, 0.97), rgba(249, 241, 233, 0.95)),
          radial-gradient(circle at 20% 18%, rgba(231, 215, 193, 0.2), transparent 25%);
        box-shadow:
          var(--shadow-lg),
          var(--shadow-md);
      }

      .leader-card::before {
        content: "";
        position: absolute;
        inset: 14px;
        border-radius: 30px;
        border: 1px solid rgba(255, 255, 255, 0.4);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.68),
          inset 0 -18px 32px rgba(227, 208, 187, 0.08);
        pointer-events: none;
      }

      .leader-portrait-wrap {
        display: flex;
        justify-content: center;
      }

      .leader-portrait {
        width: 232px;
        aspect-ratio: 1;
        border-radius: 50%;
        padding: 7px;
        background:
          radial-gradient(circle at 32% 28%, rgba(255, 250, 244, 0.92), rgba(245, 233, 220, 0.76) 68%, rgba(232, 217, 201, 0.52));
        box-shadow:
          0 0 0 1px rgba(239, 225, 212, 0.9),
          0 0 0 8px rgba(255, 248, 241, 0.42),
          0 16px 36px rgba(109, 76, 54, 0.1);
      }

      .leader-portrait img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        border-radius: 50%;
      }

      .leader-content {
        position: relative;
        z-index: 1;
        text-align: left;
      }

      .leader-name-row {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      .leader-name {
        margin: 0;
        color: var(--wine);
        font-size: clamp(1.7rem, 3vw, 2.24rem);
        line-height: 1.04;
        letter-spacing: 0.04em;
      }

      .leader-role {
        margin: 16px 0 0;
        color: rgba(141, 90, 76, 0.72);
        font-size: clamp(1rem, 2vw, 1.18rem);
        line-height: 1.7;
        letter-spacing: 0.08em;
      }

      .leader-badges {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 18px;
      }

      .leader-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 38px;
        padding: 0 18px;
        border-radius: 999px;
        border: 1px solid rgba(183, 150, 122, 0.28);
        background: linear-gradient(180deg, rgba(255, 249, 243, 0.86), rgba(243, 233, 220, 0.9));
        color: rgba(141, 90, 76, 0.92);
        font-size: 0.9rem;
        letter-spacing: 0.06em;
      }

      .leader-desc {
        margin: 18px 0 0;
        font-size: 1rem;
        line-height: 1.96;
        letter-spacing: 0.02em;
      }

      .leader-socials {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .social-link {
        width: 40px;
        height: 40px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        text-decoration: none;
        border: 1px solid rgba(145, 111, 87, 0.14);
        background: linear-gradient(180deg, rgba(255, 252, 248, 0.94), rgba(244, 235, 226, 0.82));
        color: rgba(132, 98, 80, 0.9);
        box-shadow:
          0 10px 20px rgba(109, 76, 54, 0.07),
          inset 0 1px 0 rgba(255, 255, 255, 0.62);
        transition: transform 0.24s ease, box-shadow 0.24s ease, border-color 0.24s ease;
      }

      .social-link:hover {
        transform: translateY(-1px);
        border-color: rgba(145, 111, 87, 0.22);
        box-shadow:
          0 12px 24px rgba(109, 76, 54, 0.1),
          inset 0 1px 0 rgba(255, 255, 255, 0.68);
      }

      .social-link svg {
        width: 17px;
        height: 17px;
        display: block;
        stroke: currentColor;
      }

      .social-link.line {
        color: var(--olive);
      }

      @media (max-width: 900px) {
        .page {
          width: min(100% - 28px, 760px);
          padding: 22px 0 42px;
        }

        .topbar {
          margin-bottom: 12px;
        }

        .back-btn {
          min-height: 36px;
          padding: 0 14px;
          font-size: 0.78rem;
        }

        .leaders {
          gap: 18px;
        }

        .leader-card {
          grid-template-columns: 1fr;
          gap: 16px;
          padding: 24px 20px 22px;
          border-radius: 28px;
        }

        .leader-card::before {
          inset: 10px;
          border-radius: 24px;
        }

        .leader-portrait {
          width: min(100%, 196px);
          padding: 6px;
          box-shadow:
            0 0 0 1px rgba(239, 225, 212, 0.88),
            0 0 0 6px rgba(255, 248, 241, 0.38),
            0 12px 26px rgba(109, 76, 54, 0.08);
        }

        .leader-name-row {
          gap: 8px;
        }

        .leader-name {
          font-size: clamp(1.5rem, 6.1vw, 1.82rem);
        }

        .leader-role {
          margin-top: 12px;
          font-size: 0.92rem;
          line-height: 1.66;
          letter-spacing: 0.06em;
        }

        .leader-badges {
          gap: 8px;
          margin-top: 14px;
        }

        .leader-badge {
          min-height: 34px;
          padding: 0 15px;
          font-size: 0.84rem;
        }

        .leader-desc {
          margin-top: 14px;
          font-size: 0.88rem;
          line-height: 1.78;
        }

        .social-link {
          width: 36px;
          height: 36px;
        }

        .social-link svg {
          width: 15px;
          height: 15px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="topbar">
        <a class="back-btn" href="index.html">回首頁</a>
      </div>

      <section class="leaders" aria-label="帶領者介紹">
        <article class="leader-card">
          <div class="leader-portrait-wrap">
            <div class="leader-portrait">
              <img src="leader-zhihui.jpg" alt="智堯" />
            </div>
          </div>
          <div class="leader-content">
            <div class="leader-name-row">
              <h2 class="leader-name">智堯</h2>
              <div class="leader-socials" aria-label="智堯社群連結">
                <a class="social-link ig" href="https://www.instagram.com/chihyao__subconscious/" target="_blank" rel="noreferrer" aria-label="智堯 Instagram">
                  <svg viewBox="0 0 24 24" fill="none" stroke-width="1.65" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <rect x="3.75" y="3.75" width="16.5" height="16.5" rx="5"></rect>
                    <circle cx="12" cy="12" r="3.8"></circle>
                    <circle cx="17.2" cy="6.8" r="0.9" fill="currentColor" stroke="none"></circle>
                  </svg>
                </a>
                <a class="social-link line" href="https://lin.ee/ZbGVl4Ka" target="_blank" rel="noreferrer" aria-label="智堯 LINE">
                  <svg viewBox="0 0 24 24" fill="none" stroke-width="1.55" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M12 4.5c-4.7 0-8.5 3-8.5 6.9 0 3.5 3 6.3 7 6.8l-.7 3 3.7-2.8h.5c4.7 0 8.5-3 8.5-6.9S16.7 4.5 12 4.5Z"></path>
                    <path d="M8.4 10.1v3.6"></path>
                    <path d="M10.8 10.1v3.6h2.4"></path>
                    <path d="M15 10.1v3.6"></path>
                  </svg>
                </a>
              </div>
            </div>
            <p class="leader-role">八字命理師／美國 NGH 催眠師</p>
            <div class="leader-badges" aria-label="智堯專長">
              <span class="leader-badge">命理解讀</span>
              <span class="leader-badge">能量分析</span>
              <span class="leader-badge">白話帶領</span>
            </div>
            <p class="leader-desc">
              服務八字命理個案數年資歷，用白話方式帶你看懂八字，解析你的戀愛能量與行動方向。
            </p>
          </div>
        </article>

        <article class="leader-card" id="qingqing">
          <div class="leader-portrait-wrap">
            <div class="leader-portrait">
              <img src="leader-qingqing.png" alt="青青" />
            </div>
          </div>
          <div class="leader-content">
            <div class="leader-name-row">
              <h2 class="leader-name">青青</h2>
              <div class="leader-socials" aria-label="青青社群連結">
                <a class="social-link ig" href="https://www.instagram.com/hannahchen0505949/" target="_blank" rel="noreferrer" aria-label="青青 Instagram">
                  <svg viewBox="0 0 24 24" fill="none" stroke-width="1.65" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <rect x="3.75" y="3.75" width="16.5" height="16.5" rx="5"></rect>
                    <circle cx="12" cy="12" r="3.8"></circle>
                    <circle cx="17.2" cy="6.8" r="0.9" fill="currentColor" stroke="none"></circle>
                  </svg>
                </a>
                <a class="social-link line" href="https://line.me/R/ti/p/@455ojikt" target="_blank" rel="noreferrer" aria-label="青青 LINE">
                  <svg viewBox="0 0 24 24" fill="none" stroke-width="1.55" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M12 4.5c-4.7 0-8.5 3-8.5 6.9 0 3.5 3 6.3 7 6.8l-.7 3 3.7-2.8h.5c4.7 0 8.5-3 8.5-6.9S16.7 4.5 12 4.5Z"></path>
                    <path d="M8.4 10.1v3.6"></path>
                    <path d="M10.8 10.1v3.6h2.4"></path>
                    <path d="M15 10.1v3.6"></path>
                  </svg>
                </a>
              </div>
            </div>
            <p class="leader-role">初星群 社群主持人</p>
            <div class="leader-badges" aria-label="青青專長">
              <span class="leader-badge">現場引導</span>
              <span class="leader-badge">安全陪伴</span>
              <span class="leader-badge">交流主持</span>
            </div>
            <p class="leader-desc">
              現場帶領交流、陪伴與引導，讓大家在輕鬆安全的氛圍自在分享。
            </p>
          </div>
        </article>
      </section>
    </main>
  </body>
</html>
